<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash & Bill Settlement</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#eef7f3;
    padding:12px;
}

/* Container */
.container{
    width:100%;
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:16px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
}

h2{
    text-align:center;
    color:#1b4332;
    margin-bottom:14px;
    font-size:20px;
}

/* Invoice card */
.invoice{
    border:1px solid #cce3de;
    border-radius:14px;
    padding:14px;
    margin-bottom:18px;
    background:#f8fbfa;
}

/* Header */
.inv-header{
    display:grid;
    grid-template-columns:1fr 1fr auto;
    gap:10px;
    margin-bottom:12px;
}

.inv-header input{
    width:100%;
}

/* Inputs */
label{
    font-weight:600;
    font-size:13px;
}

input,select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #bbb;
    font-size:14px;
}

/* Vertical card layout */
.grid{
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* Results */
.results{
    margin-top:14px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.box{
    background:#fff;
    padding:12px;
    border-radius:10px;
    font-size:14px;
}

.cash{border-left:5px solid #2d6a4f;}
.bank{border-left:5px solid #1d3557;}
.extra{border-left:5px solid #f4a261;}

.collect{
    grid-column:span 3;
    background:#e9f5f2;
    font-weight:bold;
    font-size:15px;
}

/* Buttons */
.remove{
    background:#e63946;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    height:42px;
}

.add{
    background:#2d6a4f;
    color:#fff;
    border:none;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    width:100%;
    font-size:15px;
    margin-bottom:14px;
}

/* Totals */
.totals{
    background:#e9f5f2;
    padding:14px;
    border-radius:14px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    font-weight:bold;
    font-size:15px;
}

/* PDF */
.pdf{
    background:#1b4332;
    color:#fff;
    border:none;
    padding:14px;
    border-radius:14px;
    width:100%;
    font-size:16px;
    margin-top:14px;
}

/* MOBILE FIXES */
@media(max-width:768px){

    h2{font-size:18px;}

    .inv-header{
        grid-template-columns:1fr;
    }

    .results{
        grid-template-columns:1fr;
    }

    .collect{
        grid-column:span 1;
    }

    .totals{
        grid-template-columns:1fr;
        font-size:14px;
    }

    input,select{
        font-size:15px;
        padding:12px;
    }

    .box{
        font-size:14px;
    }
}
</style>
</head>

<body>

<div class="container" id="printArea">
<h2>Cash & Bill Settlement</h2>

<div id="invoiceContainer"></div>

<button class="add" onclick="addInvoice()">➕ Add Invoice</button>

<div class="totals">
    <div>🏦 Total Current A/c: ₹ <span id="totalBank">0.00</span></div>
    <div>💰 Total Cash to Collect: ₹ <span id="totalCash">0.00</span></div>
    <div>📊 Total Bill % Extra: ₹ <span id="totalBillExtra">0.00</span></div>
</div>

<button class="pdf" onclick="exportPDF()">📄 Export PDF</button>
</div>

<script>
function addInvoice(){
    const div=document.createElement("div");
    div.className="invoice";
    div.innerHTML=`
    <div class="inv-header">
        <div>
            <label>Invoice / Ref No</label>
            <input type="text">
        </div>
        <div>
            <label>Date</label>
            <input type="date">
        </div>
        <button class="remove" onclick="this.closest('.invoice').remove();calcAll()">✖</button>
    </div>

    <div class="grid">
        <div>
            <label>Cash Qty (KG)</label>
            <input type="number" class="cashQty" oninput="syncQty(this);calcAll()">
        </div>

        <div>
            <label>Bill Qty (KG)</label>
            <input type="number" class="billQty" data-manual="false" oninput="markManual(this);calcAll()">
        </div>

        <div>
            <label>Cash Rate</label>
            <input type="number" class="cashRate" oninput="calcAll()">
        </div>

        <div>
            <label>Bill Rate</label>
            <input type="number" class="billRate" oninput="calcAll()">
        </div>

        <div>
            <label class="billLabel">Bill % on Cash (7%)</label>
            <select class="billPct" onchange="calcAll()">
                <option value="7">7%</option>
                <option value="8">8%</option>
                <option value="9">9%</option>
            </select>
        </div>
    </div>

    <div class="results">
        <div class="box cash">💵 Cash Deal Amount: ₹ <span class="cashDeal">0.00</span></div>
        <div class="box bank">📄 Bill Value (Incl. 18% GST): ₹ <span class="billTotal">0.00</span></div>
        <div class="box extra">📊 <span class="billPctText">Bill %</span>: ₹ <span class="billExtra">0.00</span></div>
        <div class="box collect">💰 Cash to Collect: ₹ <span class="cashCollect">0.00</span></div>
    </div>`;
    document.getElementById("invoiceContainer").appendChild(div);
}

function syncQty(el){
    const inv=el.closest(".invoice");
    const billQty=inv.querySelector(".billQty");
    if(billQty.dataset.manual==="false"){
        billQty.value=el.value;
    }
}

function markManual(el){ el.dataset.manual="true"; }

function calcAll(){
    let totalBank=0,totalCash=0,totalBillExtra=0;

    document.querySelectorAll(".invoice").forEach(inv=>{
        let cashQty=+inv.querySelector(".cashQty").value||0;
        let billQty=+inv.querySelector(".billQty").value||0;
        let cashRate=+inv.querySelector(".cashRate").value||0;
        let billRate=+inv.querySelector(".billRate").value||0;
        let pct=+inv.querySelector(".billPct").value||0;

        inv.querySelector(".billLabel").innerText=`Bill % on Cash (${pct}%)`;
        inv.querySelector(".billPctText").innerText=`Bill % (${pct}%)`;

        let cash=cashQty*cashRate;
        let billBase=billQty*billRate;
        let billTotal=billBase*1.18;
        let billExtra=billBase*pct/100;
        let cashCollect=(cash+billExtra)-billTotal;

        inv.querySelector(".cashDeal").innerText=cash.toFixed(2);
        inv.querySelector(".billTotal").innerText=billTotal.toFixed(2);
        inv.querySelector(".billExtra").innerText=billExtra.toFixed(2);
        inv.querySelector(".cashCollect").innerText=cashCollect.toFixed(2);

        totalBank+=billTotal;
        totalCash+=cashCollect;
        totalBillExtra+=billExtra;
    });

    totalBankElem.textContent=totalBank.toFixed(2);
    totalCashElem.textContent=totalCash.toFixed(2);
    totalBillExtraElem.textContent=totalBillExtra.toFixed(2);
}

const totalBankElem=document.getElementById("totalBank");
const totalCashElem=document.getElementById("totalCash");
const totalBillExtraElem=document.getElementById("totalBillExtra");

async function exportPDF(){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const pageWidth = 210;
    const pageHeight = 297;
    const margin = 10;
    let y = margin;

    const elements = [
        document.querySelector("h2"),
        ...document.querySelectorAll(".invoice"),
        document.querySelector(".totals")
    ];

    for (let i = 0; i < elements.length; i++) {
        const canvas = await html2canvas(elements[i], {
            scale: 1.5,
            useCORS: true
        });

        const imgData = canvas.toDataURL("image/jpeg", 0.75);
        const imgWidth = pageWidth - margin * 2;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;

        if (y + imgHeight > pageHeight - margin) {
            pdf.addPage();
            y = margin;
        }

        pdf.addImage(imgData, "JPEG", margin, y, imgWidth, imgHeight);
        y += imgHeight + 6;
    }

    pdf.save("Cash-Bill-Settlement.pdf");
}

addInvoice();
</script>

</body>
</html>
