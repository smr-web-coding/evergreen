<style>
/* LABEL */

label{
display:block;
margin-top:18px;
font-size:14px;
letter-spacing:0.5px;
color:#9fffd6;
}

/* INPUT FIELD */

#qty{

width:100%;
padding:14px 16px;
border-radius:10px;

background:linear-gradient(145deg,#0f2e2a,#0a1f1c);

border:1px solid rgba(0,255,170,0.25);

color:#e8fff8;
font-size:16px;

box-shadow:
inset 0 2px 6px rgba(0,0,0,0.7),
0 0 8px rgba(0,255,170,0.05);

transition:all .25s ease;

}


/* INPUT FOCUS */

#qty:focus{

outline:none;

border:1px solid #00ffb3;

box-shadow:
0 0 10px rgba(0,255,170,0.5),
inset 0 2px 6px rgba(0,0,0,0.7);

}


/* DROPDOWN */

#code{

width:100%;
padding:14px 16px;

background:linear-gradient(145deg,#0f2e2a,#0a1f1c);

border:1px solid rgba(0,255,170,0.25);

color:#e8fff8;
font-size:15px;

cursor:pointer;

box-shadow:
inset 0 2px 6px rgba(0,0,0,0.7),
0 0 8px rgba(0,255,170,0.05);

transition:all .25s ease;

}


/* DROPDOWN HOVER */

#code:hover{

border:1px solid #00ffb3;

box-shadow:
0 0 12px rgba(0,255,170,0.4);

}


/* DROPDOWN FOCUS */

#code:focus{

outline:none;

border:1px solid #00ffb3;

box-shadow:
0 0 10px rgba(0,255,170,0.5),
inset 0 2px 6px rgba(0,0,0,0.7);

}


/* OPTION STYLE */

#code option{

background:#0b1c1a;
color:#c7ffe9;

}

.container{

background:linear-gradient(135deg,#071b18,#0d2e29);

padding:40px;

border-radius:16px;

box-shadow:
0 0 40px rgba(0,255,170,0.08),

body{
background:#0b1c1a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

.container{

input,select{

width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:none;
font-size:16px;

}

.item{

margin-top:12px;
color:#7df7d3;

}

/* RESULT TABLE */

.resultTable{

margin-top:25px;
width:100%;
border-collapse:collapse;

}

.resultTable th{

text-align:left;
padding:10px;
color:#00ff9c;
font-weight:600;

}

.resultTable td{

padding:10px;
border-top:1px solid rgba(255,255,255,0.08);

}

/* percentage */

.percent{

color:#9cebd3;

}

/* MT badge */

.mt{

background:#143f38;
padding:4px 10px;
border-radius:6px;
color:#9efbd7;

}

/* KG highlight */

.kg{

background:#00ff9c;
color:black;
padding:4px 10px;
border-radius:6px;
font-weight:600;

}
/* ===== MOBILE RESPONSIVE ===== */

@media (max-width:768px){

body{
padding:20px;
align-items:flex-start;
height:auto;
}

.container{
width:100%;
max-width:100%;
padding:25px;
border-radius:12px;
}

label{

#code{

font-size:15px;

.resultTable th,
.resultTable td{

font-size:14px;

.mt,
.kg{
font-size:13px;

}

/* ===== SMALL PHONES ===== */

@media (max-width:480px){

h2{
font-size:20px;
}

.container{
padding:20px;
}

.resultTable{
font-size:13px;
}

.resultTable th{
font-size:12px;
}

.resultTable td{
font-size:12px;
}

.mt,
.kg{
display:inline-block;
margin-top:2px;
}

.item{
font-size:13px;
}

}

function showItem(){

let code=document.getElementById("code").value

if(data[code]){

document.getElementById("itemName").innerHTML="Item : "+data[code].name

}

}


function calculate(){

let qty = parseFloat(document.getElementById("qty").value);

let code = document.getElementById("code").value;

if(!qty || !data[code]) return;

let d = data[code];

// MT recovery
let Au_MT = qty * (d.Au / 100);
let Cu_MT = qty * (d.Cu / 100);
let Fe_MT = qty * (d.Fe / 100);
let Al_MT = qty * (d.Al / 100);

// KG recovery
let Au_KG = Au_MT * 1000;
let Cu_KG = Cu_MT * 1000;
let Fe_KG = Fe_MT * 1000;
let Al_KG = Al_MT * 1000;

// show up to 6 decimals
const format = (n) => Number(n).toFixed(4);

document.getElementById("result").innerHTML = `

<tr>
<td>Gold (Au)</td>
<td>${d.Au}%</td>
<td>${format(Au_MT)}</td>
<td>${format(Au_KG)}</td>
</tr>

<tr>
<td>Copper (Cu)</td>
<td>${d.Cu}%</td>
<td>${format(Cu_MT)}</td>
<td>${format(Cu_KG)}</td>
</tr>

<tr>
<td>Iron (Fe)</td>
<td>${d.Fe}%</td>
<td>${format(Fe_MT)}</td>
<td>${format(Fe_KG)}</td>
</tr>

<tr>
<td>Aluminium (Al)</td>
<td>${d.Al}%</td>
<td>${format(Al_MT)}</td>
<td>${format(Al_KG)}</td>
</tr>

`;

}


const dropdown = document.getElementById("code");

let count = 1;

Object.keys(data).forEach(code => {

let option = document.createElement("option");

option.value = code;
option.textContent = count + " - " + code;

dropdown.appendChild(option);

count++;

});
</script>
