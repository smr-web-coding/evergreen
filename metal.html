<!DOCTYPE html>
<html>

<head>

<title>Evergreen Recovery Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<style>
*{
box-sizing:border-box;
}

body{
background:#0b1c1a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:flex-start;
padding:30px;
}
#qty,
#code{

width:100%;

padding:14px 16px;

border-radius:10px;

background:linear-gradient(145deg,#0e2b27,#061a17);

border:1px solid rgba(0,255,170,0.25);

color:#dffef6;

font-size:15px;

box-shadow:
inset 0 2px 8px rgba(0,0,0,0.7),
0 0 10px rgba(0,255,170,0.08);

transition:all .25s ease;

}

#qty:focus,
#code:focus{

outline:none;

border:1px solid #00ffb3;

background:linear-gradient(145deg,#143b35,#08201c);

box-shadow:
0 0 12px rgba(0,255,170,0.5),
inset 0 2px 8px rgba(0,0,0,0.7);

}

#qty::placeholder{
color:#9ed9c9;
}
/* # column */
#historyTable th:nth-child(1),
#historyTable td:nth-child(1){
width:30px;
text-align:center;
}

/* Code column */
#historyTable th:nth-child(2),
#historyTable td:nth-child(2){
width:45px;
text-align:center;
}
/* dropdown main field */

#code{
background:#0d2f29;
color:#bfffe6;
border:1px solid #00ffb3;
}

/* dropdown list */

#code option{
background:#06201c;
color:#9effd7;
}
#historyTable{
width:100%;
table-layout:fixed;
font-size:10px;
}
/* selected option highlight */
#historyTable{
width:100%;
border-collapse:collapse;
}

#historyTable th,
#historyTable td{
border:1px solid rgba(0,255,170,0.25); /* thin neon border */
padding:8px;
text-align:left;
}

#historyTable th{
border-bottom:1px solid rgba(0,255,170,0.35);
}

#totalRow{
background:#0b3a33;
font-weight:bold;
border-top:1px solid rgba(0,255,170,0.4);
}


#code option:checked{
background:#0f5f4e;
color:#ffffff;
}
#code{
scrollbar-color:#00ffb3 #06201c;
}
.container{
width:700px;
background:#0f2a26;
padding:35px;
border-radius:14px;
box-shadow:0 0 25px rgba(0,255,156,0.25);
}

.logo{
display:flex;
justify-content:center;
margin-bottom:10px;
}

.logo img{
height:70px;
}

h2{
text-align:center;
color:#00ff9c;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
color:#9fffd6;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:15px;
}

/* BUTTONS */

.action-buttons{
display:none;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#00ff9c;
color:#000;
font-weight:600;
cursor:pointer;
}

.print{
background:#1e90ff;
color:white;
}

/* TABLE CARD */

.table-card{
display:none;
border:1px solid rgba(0,255,170,0.25);
border-radius:12px;
padding:15px;
margin-top:20px;
background:linear-gradient(145deg,#0c2420,#071b18);
}

/* TABLE */

.resultTable{
width:100%;
border-collapse:collapse;
}

.resultTable th{
padding:10px;
color:#00ff9c;
text-align:left;
}

.resultTable td{
padding:10px;
border-top:1px solid rgba(255,255,255,0.1);
}

/* TOTAL ROW */

#totalRow{
background:#083a32;
font-weight:bold;
color:#00ff9c;
}

.history-title{
text-align:center;
color:#00ff9c;
margin-bottom:10px;
}

/* MOBILE */

@media(max-width:768px){

.container{
width:100%;
}

.resultTable{
font-size:13px;
}

}

/* PRINT */
@media print{

body{
background:white;
color:black;
font-family:Arial;
}

/* hide UI elements */

.logo,
.input-section,
.action-buttons,
.item,
#resultCard{
display:none !important;
}

.item{
margin-top:18px;
margin-bottom:10px;
color:#fd0000;
font-size:14px;
letter-spacing:0.4px;
}

/* show print area */

#printArea{
display:block !important;
}

/* heading */

.print-header{
display:block;
text-align:center;
margin-bottom:20px;
}

.print-header h1{
color:green;
font-size:24px;
margin:0;
}

.print-header h2{
font-size:18px;
margin-top:5px;
}

/* table styling */

#historyTable{
width:100%;
border-collapse:collapse;
font-size:14px;
}

#historyTable th,
#historyTable td{
border:1px solid black;
padding:8px;
}

#historyTable th{
background:#e8ffe8;
color:black;
}

#totalRow{
font-weight:bold;
background:#f2f2f2;
}

}
</style>

</head>

<div class="logo">
<img src="logo.png">

<h2>EverGreen</h2>

<h2>Metal Recovery Calculator</h2>

<label>Enter Quantity (Metric Ton)</label>

<label>Select Equipment Code</label>
<select id="code" onchange="showItem();calculate()">
<option value="">Select Code</option>
</select>

<div class="action-buttons" id="buttons">

<button onclick="addCalculation()" class="btn">
Add Calculation
</button>

<button onclick="printReport()" class="btn print">
Print / Export PDF
</button>

</div>

<div style="margin-top: 15px;" id="itemName"></div>

<!-- RESULT TABLE -->

<div class="table-card" id="resultCard">

<table class="resultTable">

<thead>
<tr>
<th>Metal</th>
<th>Recovery %</th>
<th>MT</th>
<th>KG</th>
</tr>
</thead>

<tbody id="result"></tbody>

</table>

</div>

</thead>

<tbody></tbody>

</table>

</div>

</div>

/* ======================

====================== */

let totalQty=0;
let totalGold=0;
let totalCopper=0;
let totalIron=0;
let totalAluminium=0;

let historyCount=1;

/* ======================
   DROPDOWN POPULATE
====================== */

const dropdown=document.getElementById("code");

let count=1;

Object.keys(data).forEach(code=>{

let option=document.createElement("option");

option.value=code;

option.textContent=count+" - "+code;

dropdown.appendChild(option);

count++;

});

/* ======================
   SHOW ITEM NAME
====================== */

function showItem(){

let code=document.getElementById("code").value;

if(data[code]){

document.getElementById("itemName").innerHTML="Item : "+data[code].name;

}

}

/* ======================
   LIVE CALCULATION
====================== */

function calculate(){

let qty = parseFloat(document.getElementById("qty").value);
let code = document.getElementById("code").value;

if(!qty || !data[code]) return;

// show result table
document.getElementById("resultCard").style.display="block";

// show buttons
document.getElementById("buttons").style.display="flex";

let d = data[code];

// MT recovery
let Au_MT = qty * (d.Au / 100);
let Cu_MT = qty * (d.Cu / 100);
let Fe_MT = qty * (d.Fe / 100);
let Al_MT = qty * (d.Al / 100);

// KG recovery
let Au_KG = Au_MT * 1000;
let Cu_KG = Cu_MT * 1000;
let Fe_KG = Fe_MT * 1000;
let Al_KG = Al_MT * 1000;

const format = (n)=>Number(n).toFixed(6);

document.getElementById("result").innerHTML=`

<tr>
<td>Gold (Au)</td>
<td>${d.Au}%</td>
<td>${format(Au_MT)}</td>
<td>${format(Au_KG)}</td>
</tr>

<tr>
<td>Copper (Cu)</td>
<td>${d.Cu}%</td>
<td>${format(Cu_MT)}</td>
<td>${format(Cu_KG)}</td>
</tr>

<tr>
<td>Iron (Fe)</td>
<td>${d.Fe}%</td>
<td>${format(Fe_MT)}</td>
<td>${format(Fe_KG)}</td>
</tr>

<tr>
<td>Aluminium (Al)</td>
<td>${d.Al}%</td>
<td>${format(Al_MT)}</td>
<td>${format(Al_KG)}</td>
</tr>

`;

}

/* ======================
   ADD CALCULATION
====================== */

function addCalculation(){

let qty=parseFloat(document.getElementById("qty").value);

let code=document.getElementById("code").value;

if(!qty || !data[code]) return;

let d=data[code];

let Au_KG=qty*(d.Au/100)*1000;
let Cu_KG=qty*(d.Cu/100)*1000;
let Fe_KG=qty*(d.Fe/100)*1000;
let Al_KG=qty*(d.Al/100)*1000;

const format=(n)=>Number(n).toFixed(6);

totalQty+=qty;
totalGold+=Au_KG;
totalCopper+=Cu_KG;
totalIron+=Fe_KG;
totalAluminium+=Al_KG;

let table=document.querySelector("#historyTable tbody");

let oldTotal=document.getElementById("totalRow");

if(oldTotal) oldTotal.remove();

/* ADD ROW */

let row=table.insertRow();

row.innerHTML=`
<td>${historyCount}</td>
<td>${code}</td>
<td>${d.name}</td>
<td>${qty}</td>
<td>${format(Au_KG)}</td>
<td>${format(Cu_KG)}</td>
<td>${format(Fe_KG)}</td>
<td>${format(Al_KG)}</td>
`;

historyCount++;

/* TOTAL ROW */

let totalRow=table.insertRow();

totalRow.id="totalRow";

totalRow.innerHTML=`
<td colspan="3">TOTAL</td>
<td>${format(totalQty)}</td>
<td>${format(totalGold)}</td>
<td>${format(totalCopper)}</td>
<td>${format(totalIron)}</td>
<td>${format(totalAluminium)}</td>
`;

/* SHOW UI */

document.getElementById("buttons").style.display="flex";

document.getElementById("resultCard").style.display="block";

document.getElementById("historyCard").style.display="block";

}

/* ======================
   PRINT
====================== */

function printReport(){

window.print();

}
